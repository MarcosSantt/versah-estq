version: "3.9"

services:
  # ── Banco de dados PostgreSQL ─────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: versah_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: versah_estoque
      POSTGRES_USER: versah_user
      POSTGRES_PASSWORD: versah_secret
    volumes:
      - postgres_data:/var/lib/postgresql/data   # ← persistência garantida
      - ./backend/init.sql:/docker-entrypoint-initdb.d/init.sql  # ← cria tabelas no 1º boot
    ports:
      - "5432:5432"   # opcional: acesso direto via DBeaver/pgAdmin
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U versah_user -d versah_estoque"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend Node.js / Express ─────────────────────────────
  backend:
    build: ./backend
    container_name: versah_backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://versah_user:versah_secret@db:5432/versah_estoque
      JWT_SECRET: mude_esta_chave_para_producao_32chars_min
      PORT: 3000
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app          # hot-reload em dev (remover em prod)
      - /app/node_modules       # evita sobrescrever node_modules do container

  # ── Frontend estático (nginx) ─────────────────────────────
  frontend:
    image: nginx:alpine
    container_name: versah_frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro

volumes:
  postgres_data:   # volume nomeado — dados sobrevivem ao docker compose down
